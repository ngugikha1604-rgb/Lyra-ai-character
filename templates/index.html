<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyra AI Chat</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.8/browser/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js"></script>
<script src="/static/live2d/live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/index.min.js"></script>

<!-- Chart.js for analytics -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
height: 100vh;
background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0d0d1f 100%);
color: #e0e0ff;
overflow: hidden;
display: flex;
}

/* ==================== SIDEBAR ==================== */

.sidebar {
position: fixed;
left: 0;
top: 0;
width: 80px;
height: 100vh;
background: rgba(10, 10, 20, 0.9);
border-right: 1px solid rgba(0, 245, 255, 0.15);
display: flex;
flex-direction: column;
align-items: center;
padding: 20px 0;
gap: 20px;
z-index: 10;
}

.logo {
width: 50px;
height: 50px;
background: linear-gradient(135deg, #ff006e, #00f5ff);
border-radius: 12px;
display: flex;
align-items: center;
justify-content: center;
font-weight: bold;
font-size: 24px;
cursor: pointer;
transition: all 0.3s ease;
box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
}

.logo:hover {
transform: scale(1.05);
box-shadow: 0 0 30px rgba(0, 245, 255, 0.5);
}

.sidebar-divider {
width: 40px;
height: 1px;
background: rgba(0, 245, 255, 0.2);
}

.sidebar-icons {
display: flex;
flex-direction: column;
gap: 15px;
flex: 1;
}

.sidebar-icon {
width: 50px;
height: 50px;
background: rgba(0, 245, 255, 0.1);
border: 1px solid rgba(0, 245, 255, 0.2);
border-radius: 10px;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
font-size: 20px;
transition: all 0.3s ease;
}

.sidebar-icon:hover {
background: rgba(0, 245, 255, 0.2);
border-color: rgba(0, 245, 255, 0.4);
transform: translateX(5px);
}

.sidebar-icon.active {
background: linear-gradient(135deg, #00f5ff, #0099ff);
border-color: #00f5ff;
}

/* ==================== MAIN CONTAINER ==================== */

.container {
display: flex;
flex: 1;
margin-left: 80px;
gap: 20px;
padding: 20px;
height: 100vh;
}

/* ==================== PAGES ==================== */

.page {
flex: 1;
position: absolute;
width: calc(100% - 70px);
height: 100vh;
visibility: hidden;
pointer-events: none;
opacity: 0;
display: flex;
}

.page.active {
visibility: visible;
pointer-events: auto;
opacity: 1;
position: relative;
width: auto;
height: auto;
}

/* ==================== CHAT PAGE ==================== */

.page.chat-page {
gap: 20px;
}

/* ==================== MODEL SECTION ==================== */

.model-section {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
position: relative;
background: rgba(20, 20, 40, 0.3);
border-radius: 20px;
border: 1px solid rgba(0, 245, 255, 0.15);
overflow: hidden;
min-width: 400px;
}

#live2dCanvas {
display: block;
}


/* Option 5: Color Filter Overlay - ENHANCED */
#emotionFilterOverlay {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;
opacity: 0;
transition: opacity 0.6s ease, background-color 0.6s ease;
z-index: 5;
backdrop-filter: blur(0px);
}

.model-info {
position: absolute;
bottom: 30px;
left: 30px;
background: rgba(10, 10, 20, 0.8);
backdrop-filter: blur(10px);
border: 1px solid rgba(0, 245, 255, 0.3);
border-radius: 15px;
padding: 15px 25px;
z-index: 6;
}

.model-name {
font-size: 18px;
font-weight: bold;
color: #00f5ff;
letter-spacing: 2px;
margin-bottom: 8px;
}

.model-status {
font-size: 12px;
color: #a0a0ff;
display: flex;
gap: 10px;
}

.status-indicator {
width: 8px;
height: 8px;
border-radius: 50%;
background: #00ff88;
animation: pulse 2s infinite;
}

.emotion-display {
position: absolute;
top: 30px;
right: 30px;
background: rgba(10, 10, 20, 0.8);
backdrop-filter: blur(10px);
border: 1px solid rgba(0, 245, 255, 0.3);
border-radius: 15px;
padding: 12px 20px;
z-index: 6;
}

.emotion-label {
font-size: 11px;
color: #a0a0ff;
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 4px;
}

.emotion-text {
font-size: 18px;
font-weight: bold;
color: #00f5ff;
}

@keyframes pulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.5; }
}

/* ==================== CHAT SECTION ==================== */

.chat-section {
flex: 1;
display: flex;
flex-direction: column;
background: rgba(15, 15, 35, 0.6);
border-radius: 20px;
border: 1px solid rgba(0, 245, 255, 0.15);
overflow: hidden;
max-width: 500px;
backdrop-filter: blur(10px);
}

.chat-header {
padding: 25px;
background: linear-gradient(135deg, rgba(0, 245, 255, 0.1), rgba(138, 43, 226, 0.1));
border-bottom: 1px solid rgba(0, 245, 255, 0.2);
display: flex;
justify-content: space-between;
align-items: center;
}

.chat-title {
font-size: 18px;
font-weight: bold;
color: #00f5ff;
letter-spacing: 1px;
}

.chat-stats {
display: flex;
gap: 15px;
}

.stat-item {
background: rgba(0, 245, 255, 0.1);
padding: 8px 15px;
border-radius: 20px;
border: 1px solid rgba(0, 245, 255, 0.3);
font-size: 12px;
display: flex;
align-items: center;
gap: 6px;
}

.stat-value {
color: #00f5ff;
font-weight: bold;
}

#messages {
flex: 1;
overflow-y: auto;
padding: 20px;
display: flex;
flex-direction: column;
gap: 12px;
}

#messages::-webkit-scrollbar {
width: 6px;
}

#messages::-webkit-scrollbar-track {
background: rgba(0, 245, 255, 0.05);
border-radius: 10px;
}

#messages::-webkit-scrollbar-thumb {
background: rgba(0, 245, 255, 0.3);
border-radius: 10px;
}

#messages::-webkit-scrollbar-thumb:hover {
background: rgba(0, 245, 255, 0.5);
}

.message {
padding: 12px 16px;
border-radius: 15px;
font-size: 14px;
line-height: 1.5;
word-wrap: break-word;
animation: slideIn 0.3s ease-out;
max-width: 90%;
}

@keyframes slideIn {
from {
opacity: 0;
transform: translateY(10px);
}
to {
opacity: 1;
transform: translateY(0);
}
}

.message.user {
background: linear-gradient(135deg, rgba(0, 150, 255, 0.2), rgba(138, 43, 226, 0.2));
border: 1px solid rgba(0, 150, 255, 0.4);
align-self: flex-end;
color: #e0e0ff;
}

.message.ai {
background: linear-gradient(135deg, rgba(138, 43, 226, 0.15), rgba(0, 245, 255, 0.1));
border: 1px solid rgba(138, 43, 226, 0.3);
align-self: flex-start;
color: #d0d0ff;
}

.history-divider {
display: flex;
align-items: center;
gap: 10px;
width: 100%;
margin: 8px 0;
color: rgba(180, 160, 255, 0.4);
font-size: 11px;
letter-spacing: 1px;
}
.history-divider::before,
.history-divider::after {
content: "";
flex: 1;
height: 1px;
background: rgba(138, 43, 226, 0.2);
}

.loading {
display: inline-flex;
gap: 5px;
align-items: center;
}

.dot {
width: 6px;
height: 6px;
border-radius: 50%;
background: #00f5ff;
animation: typing 1.4s infinite;
}

.dot:nth-child(2) {
animation-delay: 0.2s;
}

.dot:nth-child(3) {
animation-delay: 0.4s;
}

@keyframes typing {
0%, 60%, 100% {
transform: translateY(0);
opacity: 0.5;
}
30% {
transform: translateY(-8px);
opacity: 1;
}
}

.input-area {
padding: 20px;
background: rgba(0, 0, 0, 0.3);
border-top: 1px solid rgba(0, 245, 255, 0.15);
display: flex;
gap: 12px;
}

input {
flex: 1;
padding: 12px 16px;
border-radius: 12px;
border: 1px solid rgba(0, 245, 255, 0.3);
background: rgba(15, 15, 30, 0.8);
color: #e0e0ff;
font-size: 14px;
transition: all 0.3s ease;
outline: none;
}

input:focus {
border-color: rgba(0, 245, 255, 0.6);
background: rgba(15, 15, 30, 0.95);
box-shadow: 0 0 15px rgba(0, 245, 255, 0.2);
}

input::placeholder {
color: rgba(160, 160, 200, 0.5);
}

button {
padding: 12px 24px;
border-radius: 12px;
background: linear-gradient(135deg, #00f5ff, #0099ff);
color: #000;
border: none;
font-weight: 600;
cursor: pointer;
font-size: 14px;
transition: all 0.3s ease;
box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
}

button:hover {
transform: translateY(-2px);
box-shadow: 0 5px 25px rgba(0, 245, 255, 0.5);
}

button:active {
transform: translateY(0);
}

button:disabled {
opacity: 0.5;
cursor: not-allowed;
}

/* ==================== TTS BUTTON ==================== */

#ttsToggleBtn {
padding: 12px 14px;
border-radius: 12px;
background: rgba(0, 245, 255, 0.1);
color: #00f5ff;
border: 1px solid rgba(0, 245, 255, 0.3);
font-weight: 600;
cursor: pointer;
font-size: 16px;
transition: all 0.3s ease;
box-shadow: none;
}

#ttsToggleBtn:hover {
background: rgba(0, 245, 255, 0.2);
border-color: rgba(0, 245, 255, 0.5);
transform: translateY(-2px);
box-shadow: 0 5px 15px rgba(0, 245, 255, 0.2);
}

#ttsToggleBtn.tts-on {
background: linear-gradient(135deg, rgba(0, 245, 255, 0.25), rgba(0, 153, 255, 0.25));
border-color: #00f5ff;
box-shadow: 0 0 12px rgba(0, 245, 255, 0.3);
}

#ttsToggleBtn.tts-off {
background: rgba(255, 255, 255, 0.05);
border-color: rgba(255, 255, 255, 0.15);
color: rgba(160, 160, 200, 0.5);
}

/* ==================== ANALYTICS PAGE ==================== */

.analytics-page {
flex-direction: column;
}

.analytics-container {
width: 100%;
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
}

.analytics-card {
background: rgba(15, 15, 35, 0.6);
border: 1px solid rgba(0, 245, 255, 0.15);
border-radius: 20px;
padding: 25px;
backdrop-filter: blur(10px);
}

.analytics-card.full {
grid-column: 1 / -1;
}

.card-title {
font-size: 16px;
font-weight: bold;
color: #00f5ff;
margin-bottom: 20px;
letter-spacing: 1px;
}

.chart-container {
position: relative;
height: 250px;
}

.stat-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 15px;
}

.stat-box {
background: rgba(0, 245, 255, 0.1);
border: 1px solid rgba(0, 245, 255, 0.2);
border-radius: 12px;
padding: 15px;
}

.stat-label {
font-size: 12px;
color: #a0a0ff;
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 5px;
}

.stat-number {
font-size: 24px;
font-weight: bold;
color: #00f5ff;
}

.emotions-list {
display: flex;
flex-wrap: wrap;
gap: 8px;
}

.emotion-tag {
background: rgba(138, 43, 226, 0.2);
border: 1px solid rgba(138, 43, 226, 0.4);
border-radius: 20px;
padding: 6px 12px;
font-size: 12px;
color: #d0d0ff;
}


/* ==================== MONOLOGUE OVERLAY ==================== */
.monologue-overlay {
position: absolute;
top: 15%;
width: 80%;
left: 10%;
display: flex;
justify-content: center;
z-index: 20;
pointer-events: none;
perspective: 1000px;
}
.monologue-text {
background: rgba(0, 0, 0, 0.6);
backdrop-filter: blur(8px);
border: 1px solid rgba(0, 245, 255, 0.3);
color: #00f5ff;
padding: 15px 25px;
border-radius: 20px;
font-style: italic;
font-size: 14px;
text-align: center;
box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
opacity: 0;
transform: translateY(20px) rotateX(-20deg);
transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
max-width: 400px;
}
.monologue-text.active {
opacity: 1;
transform: translateY(0) rotateX(0deg);
}

.emotion-tag.active {
background: rgba(0, 245, 255, 0.2);
border-color: rgba(0, 245, 255, 0.4);
color: #00f5ff;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo" title="Lyra">🔮</div>
<div class="sidebar-divider"></div>
<div class="sidebar-icons">
<div class="sidebar-icon active" data-page="chat-page" title="Chat" onclick="switchPage('chat-page', this)">💬</div>
<div class="sidebar-icon" data-page="analytics-page" title="Analytics" onclick="switchPage('analytics-page', this)">📊</div>
<div class="sidebar-icon" title="Settings">⚙️</div>
</div>
</div>

<!-- MAIN CONTENT -->
<div class="container">

<!-- CHAT PAGE -->
<div class="page chat-page active">

<!-- MODEL SECTION -->
<div class="model-section">
<!-- Option 5: Emotion Filter Overlay -->
<div id="emotionFilterOverlay"></div>
<!-- Monologue Layer -->
<div class="monologue-overlay" id="monologueOverlay">
  <div class="monologue-text" id="monologueText"></div>
</div>


<canvas id="live2dCanvas"></canvas>
<div class="emotion-display">
<div class="emotion-label">Current Emotion</div>
<div class="emotion-text" id="emotionDisplay">neutral</div>
<div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(0, 245, 255, 0.2); font-size: 10px;">
<div id="timeDisplay" style="color: #a0a0ff;">Vietnam Time</div>
</div>
</div>
<div class="model-info">
<div class="model-name">LYRA</div>
<div class="model-status">
<span class="status-indicator"></span>
<span>Lyra Online</span>
</div>
</div>
</div>

<!-- CHAT SECTION -->
<div class="chat-section">
<div class="chat-header">
<div class="chat-title">CHAT</div>
<div class="chat-stats">
<div class="stat-item">
<span>❤️</span>
<span class="stat-value" id="affectionValue">50</span>
<span>/100</span>
</div>

/>

</div>

<script>

let model;
let isLoading = false;
let emotionChart, moodChart;

function formatMoodValue(mood) {
if (mood > 0) return "+" + mood;
return String(mood);
}

function updateTimeDisplay(timePeriod, timeGapHours) {
const period = timePeriod || "afternoon";
let timeText = period.charAt(0).toUpperCase() + period.slice(1);
if (timeGapHours !== null && timeGapHours !== undefined && timeGapHours > 0) {
timeText += ` (${timeGapHours.toFixed(1)}h gap)`;
}
document.getElementById("timeDisplay").innerText = timeText;
}

function applyChatState(data) {
if (data.affection !== undefined) {
document.getElementById("affectionValue").innerText = data.affection;
document.getElementById("currentAffection").innerText = data.affection;
}

if (data.mood !== undefined) {
const moodDisplay = formatMoodValue(data.mood);
document.getElementById("moodValue").innerText = moodDisplay;
document.getElementById("currentMood").innerText = moodDisplay;
}

if (data.emotion) {
document.getElementById("emotionDisplay").innerText = data.emotion;
if (model) {
reactToEmotion(data.emotion);
}
}

if (data.action && data.action !== "NONE") {
triggerAction(data.action);
}

if (data.monologue) {
showMonologue(data.monologue);
}

updateTimeDisplay(data.time_period, data.time_gap_hours);
}

function showMonologue(text) {
const container = document.getElementById("monologueText");
container.innerText = text;
container.classList.remove("active");

// Trigger reflow for animation
void container.offsetWidth;

container.classList.add("active");

// Auto hide after 5 seconds
if (window.monologueTimeout) clearTimeout(window.monologueTimeout);
window.monologueTimeout = setTimeout(() => {
container.classList.remove("active");
}, 6000);
}

function triggerAction(action) {
if (!model) return;
console.log("Triggering Action:", action);

switch(action.toUpperCase()) {
case "WAVE":
  // Example: Use ParamArmLAngle or a motion if available
  // For simplicity, we use generic parameters that exist in most models
  setParam("ParamArmLAngle", 30, 0.5);
  setTimeout(() => setParam("ParamArmLAngle", 0, 0.5), 1000);
  break;
case "NOD":
  const currentY = model.internalModel.coreModel.getParameterValueById("ParamAngleY");
  setParam("ParamAngleY", 20, 0.3);
  setTimeout(() => setParam("ParamAngleY", -10, 0.3), 300);
  setTimeout(() => setParam("ParamAngleY", currentY, 0.3), 600);
  break;
case "SHAKE_HEAD":
  setParam("ParamAngleX", 25, 0.2);
  setTimeout(() => setParam("ParamAngleX", -25, 0.2), 200);
  setTimeout(() => setParam("ParamAngleX", 25, 0.2), 400);
  setTimeout(() => setParam("ParamAngleX", 0, 0.2), 600);
  break;
case "LAUGH":
  setParam("ParamMouthOpenY", 1.0, 0.1);
  setParam("ParamEyeLSmile", 1.0, 0.2);
  setParam("ParamEyeRSmile", 1.0, 0.2);
  setTimeout(() => {
    setParam("ParamMouthOpenY", 0, 0.5);
    reactToEmotion(currentEmotion); // Reset to base emotion
  }, 1500);
  break;
case "SHY":
  setParam("ParamBrowLY", -0.5, 0.5);
  setParam("ParamBrowRY", -0.5, 0.5);
  setParam("ParamEyeBallY", -0.4, 0.5);
  break;
case "SURPRISED":
  setParam("ParamEyeLOpen", 1.2, 0.1);
  setParam("ParamEyeROpen", 1.2, 0.1);
  setParam("ParamMouthOpenY", 0.8, 0.1);
  break;
}
}

async function initializeChatState() {
try {
const response = await fetch("/status");
if (!response.ok) return;
const data = await response.json();
applyChatState(data);
} catch (err) {
console.warn("Could not initialize chat state:", err);
}
}

const app = new PIXI.Application({
view: document.getElementById("live2dCanvas"),
width: document.querySelector(".model-section").clientWidth || 638,
height: document.querySelector(".model-section").clientHeight || 592,
transparent: true,
backgroundAlpha: 0,
antialias: true,
resolution: window.devicePixelRatio || 1,
autoDensity: true,
});

function repositionModel() {
if (!model) return;
const section = document.querySelector(".model-section");
if (!section) return;
const w = section.clientWidth;
const h = section.clientHeight;
if (w === 0 || h === 0) return;
app.renderer.resize(w, h);
model.x = w / 2;
model.y = h - 10;
model.scale.set(0.07);
}

window.addEventListener('resize', repositionModel);

window.addEventListener('load', async () => {
try {
const modelUrl = "/static/live2d/fuxuan/fuxuan.model3.json";
console.log("Loading model:", modelUrl);

model = await PIXI.live2d.Live2DModel.from(modelUrl);
app.stage.addChild(model);

model.anchor.set(0.5, 1);
model.scale.set(0.07);

setTimeout(repositionModel, 100);

console.log("✓ Lyra loaded");

// Bắt đầu idle animations sau khi model load xong
startIdleAnimations();

await initializeChatState();
loadAnalytics();

} catch (err) {
console.error("Live2D load error:", err);
}
});

function setParam(id, value) {
if (!model) return;

try {
const core = model.internalModel.coreModel;
const index = core._parameterIds.indexOf(id);

if (index !== -1) {
core.setParameterValueByIndex(index, value);
}
} catch (err) {

let ttsEnabled = true;

function toggleTTS() {

async function speakText(text) {
if (!ttsEnabled) return;

try {
const response = await fetch("/speak", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ text: text })
});

if (!response.ok) {
console.error("TTS request failed:", response.status);
isLoading = false;
document.getElementById("userInput").disabled = false;
document.getElementById("userInput").focus();
return;
}

const audioBlob = await response.blob();
const audioUrl = URL.createObjectURL(audioBlob);

// Dừng audio cũ nếu còn đang phát
if (currentAudio) {
currentAudio.pause();
URL.revokeObjectURL(currentAudio.src);
currentAudio = null;
stopTalkingAnimation();
}

// Đóng audioContext cũ nếu còn
if (audioContext) {
audioContext.close();
audioContext = null;
}

// ===== Web Audio API cho lip sync =====
audioContext = new (window.AudioContext || window.webkitAudioContext)();
const analyser = audioContext.createAnalyser();
analyser.fftSize = 256;
const dataArray = new Uint8Array(analyser.frequencyBinCount);

currentAudio = new Audio(audioUrl);
currentAudio.crossOrigin = "anonymous";

const source = audioContext.createMediaElementSource(currentAudio);
source.connect(analyser);
analyser.connect(audioContext.destination);

// Bắt đầu lip sync khi audio phát
currentAudio.addEventListener("play", () => {
startLipSync(analyser, dataArray);
});

// Dừng lip sync khi audio kết thúc
currentAudio.addEventListener("ended", () => {
stopTalkingAnimation();
if (audioContext) {
audioContext.close();
audioContext = null;
}
URL.revokeObjectURL(audioUrl);
currentAudio = null;
isLoading = false;
document.getElementById("userInput").disabled = false;
document.getElementById("userInput").focus();
});

// Nếu audio lỗi thì cũng mở khóa input
currentAudio.addEventListener("error", () => {
console.error("Audio playback error");
stopTalkingAnimation();
if (audioContext) {
audioContext.close();
audioContext = null;
}
currentAudio = null;
isLoading = false;
document.getElementById("userInput").disabled = false;
document.getElementById("userInput").focus();
});

await currentAudio.play();

} catch (err) {
console.error("TTS error:", err);
isLoading = false;
document.getElementById("userInput").disabled = false;
document.getElementById("userInput").focus();
}
}

async function loadChatHistory() {

  if (!response.ok) return;
  const data = await response.json();
  const history = data.history || [];

  if (history.length === 0) return;

  // Thêm divider để phân biệt lịch sử cũ với chat mới
  const messages = document.getElementById("messages");
  const divider = document.createElement("div");
  divider.className = "history-divider";
  divider.innerHTML = `<span>— previous messages —</span>`;
  messages.appendChild(divider);

  // Render từng tin nhắn
  for (const msg of history) {
    if (msg.role === "user") {
      addMessage(msg.content, "user");
    } else if (msg.role === "assistant") {
      addMessage(msg.content, "ai");
    }
  }

  // Scroll xuống cuối
  messages.scrollTop = messages.scrollHeight;

} catch (err) {
  console.warn("Could not load chat history:", err);
}
}

/* ==================== MOUSE TRACKING ==================== */
// Biến lerp cho đầu nhìn theo chuột
let mouseX = 0, mouseY = 0;           // vị trí chuột normalized (-1 đến 1)
let currentAngleX = 0, currentAngleY = 0; // giá trị hiện tại (lerp target)
const MOUSE_LERP = 0.05;              // tốc độ lerp (nhỏ = mượt hơn)
const HEAD_ANGLE_X_MAX = 25;         // giới hạn xoay trái/phải (độ)
const HEAD_ANGLE_Y_MAX = 20;         // giới hạn ngước/cúi (độ)

// Lắng nghe chuột di chuyển trong vùng model
document.querySelector(".model-section").addEventListener("mousemove", (e) => {
const rect = e.currentTarget.getBoundingClientRect();
// Normalize về -1 đến 1 từ tâm của vùng model
mouseX = ((e.clientX - rect.left) / rect.width - 0.5) * 2;
mouseY = ((e.clientY - rect.top) / rect.height - 0.5) * 2;
});

// Khi chuột rời khỏi vùng model → trả về trung tâm từ từ
document.querySelector(".model-section").addEventListener("mouseleave", () => {
mouseX = 0;
mouseY = 0;
});

/* ==================== IDLE ANIMATIONS ==================== */
// Các biến dùng cho idle (thở, body sway)
let breathPhase = 0;
let bodySwayPhase = 0;
let idleAnimFrame = null;
let currentSwayAmplitude = 1.0;      // biên độ sway hiện tại (lerp)
let targetSwayAmplitude = 1.0;       // biên độ sway target (theo cảm xúc)
const SWAY_AMP_LERP = 0.02;          // tốc độ chuyển đổi biên độ giữa cảm xúc

function startIdleAnimations() {
// Dừng loop cũ nếu còn
if (idleAnimFrame) cancelAnimationFrame(idleAnimFrame);

function idleLoop() {
if (!model) {
idleAnimFrame = requestAnimationFrame(idleLoop);
return;
}

// ===== MOUSE TRACKING — đầu nhìn theo chuột với lerp =====
// ParamAngleX: trái/phải (-30 đến 30), chuột phải = nhìn phải
// ParamAngleY: ngước/cúi (-30 đến 30), chuột lên = ngước lên
const targetAngleX = mouseX * HEAD_ANGLE_X_MAX;
const targetAngleY = -mouseY * HEAD_ANGLE_Y_MAX; // invert Y (chuột lên = nhìn lên)

currentAngleX += (targetAngleX - currentAngleX) * MOUSE_LERP;
currentAngleY += (targetAngleY - currentAngleY) * MOUSE_LERP;

setParam("ParamAngleX", currentAngleX);
setParam("ParamAngleY", currentAngleY);
// ParamAngleZ (nghiêng đầu) giữ nhỏ theo body sway (set ở dưới)

// ===== LERP BIÊN ĐỘ SWAY THEO CẢM XÚC =====
currentSwayAmplitude += (targetSwayAmplitude - currentSwayAmplitude) * SWAY_AMP_LERP;

// ===== THỞ (ParamBreath) =====
// Chu kỳ ~4 giây, dao động 0 → 1 → 0
breathPhase += 0.008;
const breathValue = (Math.sin(breathPhase) + 1) / 2;
setParam("ParamBreath", breathValue);

// Body nhẹ nhàng phồng xẹp theo hơi thở + amplitude
const bodyBreathY = breathValue * 0.04 * currentSwayAmplitude;
setParam("ParamBodyAngleY", bodyBreathY);

// ===== BODY SWAY (ParamBodyAngleX/Z) — biên độ theo cảm xúc =====
// Base amplitude: 2.5 độ, nhân với currentSwayAmplitude
bodySwayPhase += 0.005;
const swayX = Math.sin(bodySwayPhase) * 2.5 * currentSwayAmplitude;
const swayZ = Math.sin(bodySwayPhase * 0.7) * 1.5 * currentSwayAmplitude;
setParam("ParamBodyAngleX", swayX);
setParam("ParamBodyAngleZ", swayZ);

// Nghiêng đầu nhẹ theo body sway (tự nhiên hơn)
// Chỉ thêm vào giá trị đầu đang nhìn chuột
const headTiltFromBody = swayZ * 0.3;
setParam("ParamAngleZ", headTiltFromBody);

// Physics engine sẽ tự tính váy/tay/tóc từ các params trên ✓

idleAnimFrame = requestAnimationFrame(idleLoop);
}

idleAnimFrame = requestAnimationFrame(idleLoop);
}

/* ==================== LIP SYNC (Web Audio API) ==================== */

function startLipSync(analyser, dataArray) {
isTalking = true;
const emotion = emotionMap[currentEmotion];

if (talkingInterval) {
clearInterval(talkingInterval);
}

talkingInterval = setInterval(() => {
if (!isTalking) {
clearInterval(talkingInterval);
talkingInterval = null;
return;
}

// Đọc biên độ âm thanh thật từ Web Audio API
analyser.getByteFrequencyData(dataArray);

// Lấy trung bình dải tần giọng nói (0-20 = ~0-500Hz)
let sum = 0;
for (let i = 0; i < 20; i++) {
sum += dataArray[i];
}
const average = sum / 20;

// Map biên độ (0-255) sang giá trị miệng
// emotion.mouthOpen là giá trị nền theo cảm xúc hiện tại
const mouthAmount = emotion.mouthOpen + (average / 255) * 0.9;
const clampedMouth = Math.min(1.0, Math.max(0, mouthAmount));

setParam("ParamMouthOpenY", clampedMouth);

}, 33); // ~30fps
}

if (data.favoriteTopics && data.favoriteTopics.length > 0) {
const topicsList = document.getElementById("topicsList");
topicsList.innerHTML = data.favoriteTopics
.map(t => `<div class="emotion-tag active">${t}</div>`)
.join("");
}

initCharts();

} catch (err) {
console.error("Error loading analytics:", err);
}
}

function updateAnalytics(data) {
analyticsData.totalMessages++;
document.getElementById("totalMessages").innerText = analyticsData.totalMessages;

if (!analyticsData.emotions[data.emotion]) {
analyticsData.emotions[data.emotion] = 0;
}
analyticsData.emotions[data.emotion]++;

analyticsData.moodHistory.push({
timestamp: new Date(),
mood: data.mood,
affection: data.affection
});

if (analyticsData.moodHistory.length > 50) {
analyticsData.moodHistory.shift();
}

updateCharts();
}

function initCharts() {
const emotionCtx = document.getElementById("emotionChart");
const moodCtx = document.getElementById("moodChart");

if (!emotionCtx || !moodCtx) return;

const emotionLabels = Object.keys(analyticsData.emotions);
const emotionData = Object.values(analyticsData.emotions);

emotionChart = new Chart(emotionCtx, {
type: 'doughnut',
data: {
labels: emotionLabels,
datasets: [{
data: emotionData,
backgroundColor: [
'rgba(0, 245, 255, 0.6)',
'rgba(138, 43, 226, 0.6)',
'rgba(255, 0, 110, 0.6)',
'rgba(0, 153, 255, 0.6)',
'rgba(255, 165, 0, 0.6)',
'rgba(50, 205, 50, 0.6)',
'rgba(220, 20, 60, 0.6)',
'rgba(65, 105, 225, 0.6)',
'rgba(255, 215, 0, 0.6)',
'rgba(173, 255, 47, 0.6)',
'rgba(199, 21, 133, 0.6)',
'rgba(34, 139, 34, 0.6)',
'rgba(255, 20, 147, 0.6)',
'rgba(72, 209, 204, 0.6)',
'rgba(139, 69, 19, 0.6)'
],
borderColor: 'rgba(0, 245, 255, 0.2)',
borderWidth: 1
}
]
},
options: {
responsive: true,
maintainAspectRatio: false,
plugins: {
legend: {
labels: {
color: '#a0a0ff',
font: { size: 11 }
}
}
}
}
});

const moodLabels = analyticsData.moodHistory.map((_, i) => i);
const moodValues = analyticsData.moodHistory.map(m => m.mood);

moodChart = new Chart(moodCtx, {
type: 'line',
data: {
labels: moodLabels,
datasets: [{
label: 'Mood',
data: moodValues,
borderColor: '#00f5ff',
backgroundColor: 'rgba(0, 245, 255, 0.1)',
tension: 0.4,
fill: true
}]
},
options: {
responsive: true,
maintainAspectRatio: false,
plugins: {
legend: {
labels: { color: '#a0a0ff' }
}
},
scales: {
y: {
grid: { color: 'rgba(0, 245, 255, 0.1)' },
ticks: { color: '#a0a0ff' }
},
x: {
grid: { color: 'rgba(0, 245, 255, 0.1)' },
ticks: { color: '#a0a0ff' }
}
}
}
});
}

function updateCharts() {
if (emotionChart) {
emotionChart.data.labels = Object.keys(analyticsData.emotions);
emotionChart.data.datasets[0].data = Object.values(analyticsData.emotions);
emotionChart.update();
}

if (moodChart) {
const moodLabels = analyticsData.moodHistory.map((_, i) => i);
const moodValues = analyticsData.moodHistory.map(m => m.mood);
moodChart.data.labels = moodLabels;
moodChart.data.datasets[0].data = moodValues;
moodChart.update();
}
}

</script>

</body>
</html>
