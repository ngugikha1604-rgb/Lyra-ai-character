<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyra Stream</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.8/browser/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js"></script>
<script src="/static/live2d/live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/index.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
}

#live2dCanvas {
  display: block;
  position: fixed;
  top: 0; left: 0;
  background: transparent !important;
}

#emotionFilterOverlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.6s ease, background-color 0.6s ease;
  mix-blend-mode: screen;
  z-index: 5;
}

/* Monologue bubble hiện phía trên model */
.monologue-overlay {
  position: fixed;
  top: 8%;
  width: 80%;
  left: 10%;
  display: flex;
  justify-content: center;
  z-index: 20;
  pointer-events: none;
  perspective: 1000px;
}
.monologue-text {
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(0, 245, 255, 0.3);
  color: #00f5ff;
  padding: 12px 22px;
  border-radius: 20px;
  font-family: 'Segoe UI', Roboto, sans-serif;
  font-style: italic;
  font-size: 15px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  opacity: 0;
  transform: translateY(20px) rotateX(-20deg);
  transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
  max-width: 420px;
}
.monologue-text.active {
  opacity: 1;
  transform: translateY(0) rotateX(0deg);
}

/* Mic status indicator nhỏ ở góc */
#micStatus {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(0,245,255,0.25);
  border-radius: 20px;
  padding: 5px 14px;
  font-family: 'Segoe UI', sans-serif;
  font-size: 12px;
  color: rgba(160,200,255,0.7);
  z-index: 30;
  pointer-events: none;
  transition: opacity 0.4s;
}
#micStatus.hidden { opacity: 0; }
</style>
</head>

<body>

<div id="emotionFilterOverlay"></div>

<div class="monologue-overlay" id="monologueOverlay">
  <div class="monologue-text" id="monologueText"></div>
</div>

<canvas id="live2dCanvas"></canvas>

<div id="micStatus" class="hidden">🎤 Đang nghe...</div>

<script>

/* ==================== LIVE2D SETUP ==================== */

const canvas = document.getElementById("live2dCanvas");

// Tạo WebGL context với alpha thật sự transparent
const gl = canvas.getContext("webgl", { alpha: true, premultipliedAlpha: false })
           || canvas.getContext("experimental-webgl", { alpha: true, premultipliedAlpha: false });

const app = new PIXI.Application({
  view: canvas,
  width: window.innerWidth,
  height: window.innerHeight,
  transparent: true,
  backgroundAlpha: 0,
  clearBeforeRender: true,
  antialias: true,
  resolution: window.devicePixelRatio || 1,
  autoDensity: true,
  context: gl,
});

let model;

function repositionModel() {
  if (!model) return;
  const w = window.innerWidth, h = window.innerHeight;
  app.renderer.resize(w, h);
  model.x = w / 2;
  model.y = h - 10;
  model.scale.set(0.07);
}
window.addEventListener("resize", repositionModel);

window.addEventListener("load", async () => {
  try {
    model = await PIXI.live2d.Live2DModel.from("/static/live2d/fuxuan/fuxuan.model3.json");
    app.stage.addChild(model);
    model.anchor.set(0.5, 1);
    model.scale.set(0.07);
    setTimeout(repositionModel, 100);
    startIdleAnimations();
    startBlinking();
    await initializeChatState();
    // Bắt đầu vòng lặp mic sau khi mọi thứ sẵn sàng
    setTimeout(startMicLoop, 1500);
  } catch (err) {
    console.error("Live2D load error:", err);
  }
});

function setParam(id, value) {
  if (!model) return;
  try {
    const core = model.internalModel.coreModel;
    const index = core._parameterIds.indexOf(id);
    if (index !== -1) core.setParameterValueByIndex(index, value);
  } catch (e) { /* ignore */ }
}

/* ==================== STATE ==================== */

async function initializeChatState() {
  try {
    const res = await fetch("/status");
    if (!res.ok) return;
    applyChatState(await res.json());
  } catch (e) { console.warn("Could not init chat state:", e); }
}

function applyChatState(data) {
  if (data.emotion) {
    reactToEmotion(data.emotion);
  }
  if (data.action && data.action !== "NONE") triggerAction(data.action);
  if (data.monologue) showMonologue(data.monologue);
}

function showMonologue(text) {
  const el = document.getElementById("monologueText");
  el.innerText = text;
  el.classList.remove("active");
  void el.offsetWidth;
  el.classList.add("active");
  if (window.monologueTimeout) clearTimeout(window.monologueTimeout);
  window.monologueTimeout = setTimeout(() => el.classList.remove("active"), 6000);
}

/* ==================== TTS ==================== */

let currentAudio = null;
let talkingInterval = null;
let audioContext = null;
let isSpeaking = false;

async function speakText(text) {
  try {
    isSpeaking = true;
    const res = await fetch("/speak", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });
    if (!res.ok) { isSpeaking = false; return; }

    const audioBlob = await res.blob();
    const audioUrl = URL.createObjectURL(audioBlob);

    if (currentAudio) { currentAudio.pause(); URL.revokeObjectURL(currentAudio.src); currentAudio = null; stopTalkingAnimation(); }
    if (audioContext) { audioContext.close(); audioContext = null; }

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    const dataArray = new Uint8Array(analyser.frequencyBinCount);

    currentAudio = new Audio(audioUrl);
    currentAudio.crossOrigin = "anonymous";
    const source = audioContext.createMediaElementSource(currentAudio);
    source.connect(analyser);
    analyser.connect(audioContext.destination);

    currentAudio.addEventListener("play", () => startLipSync(analyser, dataArray));
    currentAudio.addEventListener("ended", () => {
      stopTalkingAnimation();
      if (audioContext) { audioContext.close(); audioContext = null; }
      URL.revokeObjectURL(audioUrl);
      currentAudio = null;
      isSpeaking = false;
      // Sau khi Lyra nói xong → bật mic lại
      startListening();
    });
    currentAudio.addEventListener("error", () => {
      stopTalkingAnimation();
      if (audioContext) { audioContext.close(); audioContext = null; }
      currentAudio = null;
      isSpeaking = false;
      startListening();
    });

    await currentAudio.play();
  } catch (err) {
    console.error("TTS error:", err);
    isSpeaking = false;
    startListening();
  }
}

/* ==================== CHAT ==================== */

let isLoading = false;

async function sendMessage(text) {
  if (!text || isLoading) return;
  isLoading = true;

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    applyChatState(data);
    if (data.reply) {
      showMonologue(data.reply);
      await speakText(data.reply);
    } else {
      isLoading = false;
      startListening();
    }
  } catch (e) {
    console.error("Chat error:", e);
    isLoading = false;
    startListening();
  }
}

/* ==================== PROACTIVE MESSAGING ==================== */

const PROACTIVE_INTERVAL = 5 * 60 * 1000;

setTimeout(() => {
  setInterval(async () => {
    if (isLoading || isSpeaking || isListening) return;
    try {
      const res = await fetch("/proactive");
      if (!res.ok) return;
      const data = await res.json();
      if (data.should_show && data.message) {
        applyChatState(data);
        showMonologue(data.message);
        await speakText(data.message);
      }
    } catch (e) { console.warn("Proactive poll error:", e); }
  }, PROACTIVE_INTERVAL);
}, PROACTIVE_INTERVAL);

/* ==================== SPEECH RECOGNITION (STT) ==================== */

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening = false;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'vi-VN';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isListening = true;
    showMicStatus(true);
  };

  recognition.onresult = (event) => {
    let final = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) final += event.results[i][0].transcript;
    }
    if (final.trim()) {
      isLoading = false; // reset trước khi gửi
      sendMessage(final.trim());
    }
  };

  recognition.onend = () => {
    isListening = false;
    showMicStatus(false);
    // Nếu không có kết quả và không đang xử lý → bật lại mic sau 1s
    if (!isLoading && !isSpeaking) {
      setTimeout(startListening, 1000);
    }
  };

  recognition.onerror = (event) => {
    console.warn("[STT] Error:", event.error);
    isListening = false;
    showMicStatus(false);
    if (!isLoading && !isSpeaking) {
      setTimeout(startListening, 2000);
    }
  };
}

function startListening() {
  if (!recognition || isListening || isSpeaking || isLoading) return;
  try {
    recognition.start();
  } catch (e) {
    // Đã đang chạy hoặc lỗi khác — thử lại sau
    setTimeout(startListening, 1500);
  }
}

function startMicLoop() {
  startListening();
}

function showMicStatus(active) {
  const el = document.getElementById("micStatus");
  if (active) {
    el.classList.remove("hidden");
  } else {
    el.classList.add("hidden");
  }
}

/* ==================== YOUTUBE STREAM SSE ==================== */

const streamEvents = new EventSource("/stream/events");

streamEvents.onmessage = (e) => {
  try {
    const data = JSON.parse(e.data);
    if (data.type === "connected") return;
    applyChatState(data);
    if (data.reply) {
      showMonologue(data.reply);
      speakText(data.reply);
    }
  } catch (err) {
    console.warn("SSE parse error:", err);
  }
};

streamEvents.onerror = () => {
  console.warn("[SSE] Connection lost, will retry automatically.");
};

/* ==================== EMOTIONS ==================== */

let currentEmotion = "neutral";
let blinkInterval;
let isTalking = false;

const emotionMap = {
  "neutral":      { eyeLOpen:1,    eyeROpen:1,    eyeBallX:0, eyeBallY:0,    browLY:0,    browRY:0,    browLForm:0,    browRForm:0,    mouthForm:0,    mouthOpen:0,    filterColor:"rgba(255,255,255,0)", filterOpacity:0,    swayAmplitude:1.0 },
  "content":      { eyeLOpen:0.6,  eyeROpen:0.6,  eyeBallX:0, eyeBallY:-0.2, browLY:0.4,  browRY:0.4,  browLForm:0.3,  browRForm:0.3,  mouthForm:0.5,  mouthOpen:0.2,  filterColor:"rgba(100,220,180,1)", filterOpacity:0.15, swayAmplitude:1.1 },
  "happy":        { eyeLOpen:0.4,  eyeROpen:0.4,  eyeBallX:0, eyeBallY:-0.1, browLY:0.6,  browRY:0.6,  browLForm:0.5,  browRForm:0.5,  mouthForm:0.9,  mouthOpen:0.4,  filterColor:"rgba(255,200,0,1)",   filterOpacity:0.25, swayAmplitude:1.6 },
  "ecstatic":     { eyeLOpen:0.2,  eyeROpen:0.2,  eyeBallX:0, eyeBallY:-0.3, browLY:0.8,  browRY:0.8,  browLForm:0.7,  browRForm:0.7,  mouthForm:1.0,  mouthOpen:0.6,  filterColor:"rgba(255,215,0,1)",   filterOpacity:0.35, swayAmplitude:2.2 },
  "sad":          { eyeLOpen:0.8,  eyeROpen:0.8,  eyeBallX:0, eyeBallY:0.3,  browLY:-0.6, browRY:-0.6, browLForm:-0.5, browRForm:-0.5, mouthForm:-0.9, mouthOpen:-0.4, filterColor:"rgba(100,150,220,1)", filterOpacity:0.25, swayAmplitude:0.4 },
  "disappointed": { eyeLOpen:0.7,  eyeROpen:0.7,  eyeBallX:0, eyeBallY:0.2,  browLY:-0.4, browRY:-0.4, browLForm:-0.3, browRForm:-0.3, mouthForm:-0.5, mouthOpen:-0.2, filterColor:"rgba(120,160,180,1)", filterOpacity:0.18, swayAmplitude:0.5 },
  "angry":        { eyeLOpen:1,    eyeROpen:1,    eyeBallX:0, eyeBallY:0,    browLY:-1.0, browRY:-1.0, browLForm:-0.8, browRForm:-0.8, mouthForm:-0.7, mouthOpen:0.2,  filterColor:"rgba(255,100,100,1)", filterOpacity:0.3,  swayAmplitude:1.8 },
  "furious":      { eyeLOpen:1,    eyeROpen:1,    eyeBallX:0, eyeBallY:-0.1, browLY:-1.0, browRY:-1.0, browLForm:-1.0, browRForm:-1.0, mouthForm:-0.9, mouthOpen:0.3,  filterColor:"rgba(255,50,50,1)",   filterOpacity:0.4,  swayAmplitude:2.5 },
  "bored":        { eyeLOpen:0.3,  eyeROpen:0.3,  eyeBallX:0, eyeBallY:0.4,  browLY:-0.5, browRY:-0.5, browLForm:-0.4, browRForm:-0.4, mouthForm:-0.5, mouthOpen:-0.3, filterColor:"rgba(80,80,100,1)",   filterOpacity:0.2,  swayAmplitude:0.3 },
  "sleeping":     { eyeLOpen:0,    eyeROpen:0,    eyeBallX:0, eyeBallY:0,    browLY:-0.7, browRY:-0.7, browLForm:-0.3, browRForm:-0.3, mouthForm:0,    mouthOpen:-0.2, filterColor:"rgba(50,50,80,1)",    filterOpacity:0.3,  swayAmplitude:0.05 },
  "thinking":     { eyeLOpen:0.9,  eyeROpen:0.9,  eyeBallX:0, eyeBallY:-0.6, browLY:1.0,  browRY:1.0,  browLForm:0.8,  browRForm:0.8,  mouthForm:0.2,  mouthOpen:-0.1, filterColor:"rgba(200,150,255,1)", filterOpacity:0.22, swayAmplitude:0.6 },
  "friendly":     { eyeLOpen:0.65, eyeROpen:0.65, eyeBallX:0, eyeBallY:-0.25,browLY:0.5,  browRY:0.5,  browLForm:0.4,  browRForm:0.4,  mouthForm:0.8,  mouthOpen:0.3,  filterColor:"rgba(100,220,200,1)", filterOpacity:0.2,  swayAmplitude:1.4 },
  "loving":       { eyeLOpen:0.35, eyeROpen:0.35, eyeBallX:0, eyeBallY:-0.3, browLY:0.7,  browRY:0.7,  browLForm:0.6,  browRForm:0.6,  mouthForm:0.95, mouthOpen:0.35, filterColor:"rgba(255,150,200,1)", filterOpacity:0.28, swayAmplitude:1.3 },
  "cold":         { eyeLOpen:1,    eyeROpen:1,    eyeBallX:0, eyeBallY:0.1,  browLY:-0.6, browRY:-0.6, browLForm:-0.5, browRForm:-0.5, mouthForm:-0.4, mouthOpen:-0.1, filterColor:"rgba(100,200,255,1)", filterOpacity:0.25, swayAmplitude:0.2 },
  "observing":    { eyeLOpen:1,    eyeROpen:1,    eyeBallX:0, eyeBallY:-0.05,browLY:0.2,  browRY:0.2,  browLForm:0.15, browRForm:0.15, mouthForm:0.1,  mouthOpen:0,    filterColor:"rgba(0,200,200,1)",   filterOpacity:0.12, swayAmplitude:0.7 },
};

/* ==================== MOUSE TRACKING ==================== */

let mouseX = 0, mouseY = 0;
let currentAngleX = 0, currentAngleY = 0;
const MOUSE_LERP = 0.05;
const HEAD_ANGLE_X_MAX = 25;
const HEAD_ANGLE_Y_MAX = 20;

document.addEventListener("mousemove", (e) => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

/* ==================== IDLE ANIMATIONS ==================== */

let breathPhase = 0;
let bodySwayPhase = 0;
let idleAnimFrame = null;
let currentSwayAmplitude = 1.0;
let targetSwayAmplitude = 1.0;
const SWAY_AMP_LERP = 0.02;

function startIdleAnimations() {
  if (idleAnimFrame) cancelAnimationFrame(idleAnimFrame);

  function idleLoop() {
    if (!model) { idleAnimFrame = requestAnimationFrame(idleLoop); return; }

    const targetAngleX = mouseX * HEAD_ANGLE_X_MAX;
    const targetAngleY = -mouseY * HEAD_ANGLE_Y_MAX;
    currentAngleX += (targetAngleX - currentAngleX) * MOUSE_LERP;
    currentAngleY += (targetAngleY - currentAngleY) * MOUSE_LERP;
    setParam("ParamAngleX", currentAngleX);
    setParam("ParamAngleY", currentAngleY);

    currentSwayAmplitude += (targetSwayAmplitude - currentSwayAmplitude) * SWAY_AMP_LERP;

    breathPhase += 0.008;
    const breathValue = (Math.sin(breathPhase) + 1) / 2;
    setParam("ParamBreath", breathValue);
    setParam("ParamBodyAngleY", breathValue * 0.04 * currentSwayAmplitude);

    bodySwayPhase += 0.005;
    const swayX = Math.sin(bodySwayPhase) * 2.5 * currentSwayAmplitude;
    const swayZ = Math.sin(bodySwayPhase * 0.7) * 1.5 * currentSwayAmplitude;
    setParam("ParamBodyAngleX", swayX);
    setParam("ParamBodyAngleZ", swayZ);
    setParam("ParamAngleZ", swayZ * 0.3);

    idleAnimFrame = requestAnimationFrame(idleLoop);
  }
  idleAnimFrame = requestAnimationFrame(idleLoop);
}

/* ==================== BLINKING ==================== */

function startBlinking() {
  clearInterval(blinkInterval);
  blinkInterval = setInterval(() => {
    const emotion = emotionMap[currentEmotion];
    if (currentEmotion === "sleeping") return;
    setParam("ParamEyeLOpen", 0);
    setParam("ParamEyeROpen", 0);
    setTimeout(() => {
      if (Math.random() < 0.2) {
        setTimeout(() => {
          setParam("ParamEyeLOpen", 0);
          setParam("ParamEyeROpen", 0);
          setTimeout(() => {
            setParam("ParamEyeLOpen", emotion.eyeLOpen);
            setParam("ParamEyeROpen", emotion.eyeROpen);
          }, 80);
        }, 150);
      } else {
        setParam("ParamEyeLOpen", emotion.eyeLOpen);
        setParam("ParamEyeROpen", emotion.eyeROpen);
      }
    }, 80);
  }, 2500 + Math.random() * 2500);
}

/* ==================== LIP SYNC ==================== */

function startLipSync(analyser, dataArray) {
  isTalking = true;
  const emotion = emotionMap[currentEmotion];
  if (talkingInterval) clearInterval(talkingInterval);
  talkingInterval = setInterval(() => {
    if (!isTalking) { clearInterval(talkingInterval); talkingInterval = null; return; }
    analyser.getByteFrequencyData(dataArray);
    let sum = 0;
    for (let i = 0; i < 20; i++) sum += dataArray[i];
    const avg = sum / 20;
    setParam("ParamMouthOpenY", Math.min(1.0, Math.max(0, emotion.mouthOpen + (avg / 255) * 0.9)));
  }, 33);
}

function stopTalkingAnimation() {
  isTalking = false;
  if (talkingInterval) { clearInterval(talkingInterval); talkingInterval = null; }
  setParam("ParamMouthOpenY", (emotionMap[currentEmotion] || emotionMap["neutral"]).mouthOpen);
}

/* ==================== EMOTION REACTIONS ==================== */

function applyColorFilter(emotion) {
  const overlay = document.getElementById("emotionFilterOverlay");
  const p = emotionMap[emotion];
  overlay.style.backgroundColor = p.filterColor;
  overlay.style.opacity = p.filterOpacity;
}

function reactToEmotion(emotion) {
  currentEmotion = emotion;
  const p = emotionMap[emotion] || emotionMap["neutral"];
  targetSwayAmplitude = p.swayAmplitude !== undefined ? p.swayAmplitude : 1.0;

  setParam("ParamEyeLOpen", p.eyeLOpen);
  setParam("ParamEyeROpen", p.eyeROpen);
  setParam("ParamEyeBallX", p.eyeBallX);
  setParam("ParamEyeBallY", p.eyeBallY);

  const smileEmotions = ["happy", "ecstatic", "loving", "friendly", "content"];
  const smileAmt = (emotion === "ecstatic" || emotion === "loving") ? 1.0 : 0.6;
  setParam("ParamEyeLSmile", smileEmotions.includes(emotion) ? smileAmt : 0);
  setParam("ParamEyeRSmile", smileEmotions.includes(emotion) ? smileAmt : 0);

  setParam("ParamBrowLY", p.browLY);
  setParam("ParamBrowRY", p.browRY);
  setParam("ParamBrowLForm", p.browLForm);
  setParam("ParamBrowRForm", p.browRForm);
  setParam("ParamMouthForm", p.mouthForm);
  setParam("ParamMouthOpenY", p.mouthOpen);

  applyColorFilter(emotion);
  startBlinking();
}

/* ==================== ACTIONS ==================== */

function triggerAction(action) {
  if (!model) return;
  switch (action.toUpperCase()) {
    case "WAVE":
      setParam("ParamArmLAngle", 30);
      setTimeout(() => setParam("ParamArmLAngle", 0), 1000);
      break;
    case "NOD":
      setParam("ParamAngleY", 20);
      setTimeout(() => setParam("ParamAngleY", -10), 300);
      setTimeout(() => setParam("ParamAngleY", 0), 600);
      break;
    case "SHAKE_HEAD":
      setParam("ParamAngleX", 25);
      setTimeout(() => setParam("ParamAngleX", -25), 200);
      setTimeout(() => setParam("ParamAngleX", 25), 400);
      setTimeout(() => setParam("ParamAngleX", 0), 600);
      break;
    case "LAUGH":
      setParam("ParamMouthOpenY", 1.0);
      setParam("ParamEyeLSmile", 1.0);
      setParam("ParamEyeRSmile", 1.0);
      setTimeout(() => { setParam("ParamMouthOpenY", 0); reactToEmotion(currentEmotion); }, 1500);
      break;
    case "SHY":
      setParam("ParamBrowLY", -0.5);
      setParam("ParamBrowRY", -0.5);
      setParam("ParamEyeBallY", -0.4);
      break;
    case "SURPRISED":
      setParam("ParamEyeLOpen", 1.2);
      setParam("ParamEyeROpen", 1.2);
      setParam("ParamMouthOpenY", 0.8);
      break;
  }
}

</script>
</body>
</html>
